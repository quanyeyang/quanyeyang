name: Update Recent Merged PRs

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch PRs and Update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh search prs --author Ada-Church-Closure --state merged --limit 5 \
            --json title,url,repository \
            --jq '.[] | "- [\(.title)](\(.url)) in **\(.repository.nameWithOwner)**"' > prs.txt
          
          awk '/<!-- BEGIN_RECENT_PRS -->/{print; system("cat prs.txt"); f=1; next} /<!-- END_RECENT_PRS -->/{f=0} !f' README.md > temp.md
          mv temp.md README.md

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto update recent PRs" && git push)
